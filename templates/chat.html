<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>IA para Escritores</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header>
📚 IA para Escritores
</header>

<div class="container">

  <div class="sidebar">
    <h3>Ferramentas</h3>
    <button onclick="gerarIdeia()">💡 Ideia</button>
    <button onclick="criarPersonagem()">🎭 Personagem</button>
    <button onclick="continuar()">✍️ Continuar</button>
    <button onclick="revisar()">📝 Revisar</button>
    <button onclick="traduzir()">🌎 Traduzir</button>
    <button onclick="document.getElementById('fileInput').click()">📁 Upload Arquivo</button>
    <input type="file" id="fileInput" style="display:none" onchange="uploadArquivo(event)">
  </div>

  <div class="editor">
    <h2>Editor</h2>
    <textarea id="texto" placeholder="Comece a escrever sua história..."></textarea>

    <div class="actions">
      <button onclick="continuar()">Continuar história</button>
      <button onclick="revisar()">Revisar texto</button>
      <button onclick="traduzir()">Traduzir</button>
    </div>

    <div class="resultado" id="resultado">
      Resultado da IA aparecerá aqui...
    </div>
  </div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
<script>
// Mesma função de upload
function uploadArquivo(event){
    const file = event.target.files[0];
    if(!file) return;

    const formData = new FormData();
    formData.append("file", file);

    fetch("/upload", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        if(data.conteudo){
            document.getElementById("texto").value = data.conteudo;
            alert("Arquivo carregado com sucesso!");
        } else {
            alert(data.mensagem);
        }
    })
    .catch(err => alert("Erro ao enviar arquivo."));
}
</script>
</body>
</html>
